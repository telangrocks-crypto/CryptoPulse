name: CryptoPulse Full Automated Testing & Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - registration
          - trading
          - deployment

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false'
  AWS_API_URL: 'https://hs28uxr9j6.execute-api.ap-south-1.amazonaws.com/prod'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # =============================================================================
  # PHASE 1: BUILD AND PREPARE APK
  # =============================================================================
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      apk_path: ${{ steps.upload_apk.outputs.artifact-url }}
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        
    - name: Grant Execute Permission
      run: chmod +x gradlew
    
    - name: Clean Build
      run: ./gradlew clean
      
    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon --stacktrace
      
    - name: Sign APK (Debug Key for Testing)
      run: |
        # Create debug keystore for testing
        keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -validity 10000 -dname "CN=Android Debug,O=Android,C=US" || true
        # Sign the APK
        ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android app/build/outputs/apk/release/app-release-unsigned.apk || echo "APK already signed or signing skipped"
        
    - name: Upload Signed APK
      id: upload_apk
      uses: actions/upload-artifact@v4
      with:
        name: cryptopulse-release-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30

  # =============================================================================
  # PHASE 2: VIRTUAL EMULATOR TESTING
  # =============================================================================
  emulator-tests:
    name: Virtual Emulator Testing
    runs-on: ubuntu-latest
    needs: build-apk
    timeout-minutes: 45
    continue-on-error: false
    
    strategy:
      fail-fast: false
      matrix:
        test-scenario: [registration, api_keys, entry_price, simulate_trades, execute_trades]
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: cryptopulse-release-apk
        path: artifacts/
        
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: AVD Cache
      uses: actions/cache@v4
      id: avd-cache
      with:
        path: |
          ~/.android/avd/*
          ~/.android/adb*
        key: avd-29
        
    - name: Create AVD and Generate Snapshot
      if: steps.avd-cache.outputs.cache-hit != 'true'
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        force-avd-creation: false
        emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: false
        script: |
          echo "Generated AVD snapshot for caching."
          
    - name: Run Emulator Tests - ${{ matrix.test-scenario }}
      id: run_tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        force-avd-creation: false
        emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: true
        script: |
          echo "========================================"
          echo "TESTING SCENARIO: ${{ matrix.test-scenario }}"
          echo "========================================"
          
          # Install APK
          adb install -r artifacts/app-release-unsigned.apk || adb install -r artifacts/*.apk
          
          # Start logcat in background
          adb logcat -c
          adb logcat -v threadtime > /tmp/logcat_${{ matrix.test-scenario }}.txt 2>&1 &
          LOGCAT_PID=$!
          
          # Run tests based on scenario
          case "${{ matrix.test-scenario }}" in
            registration)
              echo "Testing User Registration Flow..."
              # Start app and capture initial state
              adb shell am start -n com.cryptopulse.trader/.ui.MainActivity
              sleep 5
              # Check if app started successfully
              APP_RUNNING=$(adb shell ps | grep cryptopulse | wc -l)
              if [ "$APP_RUNNING" -gt 0 ]; then
                echo "✅ App launched successfully"
              else
                echo "❌ App failed to launch"
                exit 1
              fi
              ;;
              
            api_keys)
              echo "Testing API Key Activation..."
              # Test API connectivity
              RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.AWS_API_URL }}/auth)
              if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "400" ] || [ "$RESPONSE" = "401" ] || [ "$RESPONSE" = "403" ]; then
                echo "✅ API Gateway accessible (HTTP $RESPONSE)"
              else
                echo "❌ API Gateway not accessible (HTTP $RESPONSE)"
                exit 1
              fi
              ;;
              
            entry_price)
              echo "Testing Entry Price Setup..."
              # Test market data endpoint
              MARKET_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.AWS_API_URL }}/market-data)
              if [ "$MARKET_RESPONSE" = "200" ] || [ "$MARKET_RESPONSE" = "400" ] || [ "$MARKET_RESPONSE" = "401" ]; then
                echo "✅ Market data endpoint accessible"
              else
                echo "❌ Market data endpoint issue (HTTP $MARKET_RESPONSE)"
              fi
              ;;
              
            simulate_trades)
              echo "Testing Trade Simulation..."
              # Test trades endpoint
              TRADE_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.AWS_API_URL }}/trades)
              if [ "$TRADE_RESPONSE" = "200" ] || [ "$TRADE_RESPONSE" = "400" ] || [ "$TRADE_RESPONSE" = "401" ]; then
                echo "✅ Trades endpoint accessible"
              else
                echo "❌ Trades endpoint issue (HTTP $TRADE_RESPONSE)"
              fi
              ;;
              
            execute_trades)
              echo "Testing Exchange Trade Execution..."
              # Test portfolio endpoint
              PORTFOLIO_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.AWS_API_URL }}/portfolio)
              if [ "$PORTFOLIO_RESPONSE" = "200" ] || [ "$PORTFOLIO_RESPONSE" = "400" ] || [ "$PORTFOLIO_RESPONSE" = "401" ]; then
                echo "✅ Portfolio endpoint accessible"
              else
                echo "❌ Portfolio endpoint issue (HTTP $PORTFOLIO_RESPONSE)"
              fi
              ;;
          esac
          
          # Capture screenshots
          adb shell screencap -p /sdcard/screen_${{ matrix.test-scenario }}.png
          adb pull /sdcard/screen_${{ matrix.test-scenario }}.png /tmp/screen_${{ matrix.test-scenario }}.png || echo "Screenshot capture attempted"
          
          # Stop logcat
          kill $LOGCAT_PID || true
          sleep 2
          
          echo "========================================"
          echo "Test completed for ${{ matrix.test-scenario }}"
          echo "========================================"
      continue-on-error: true
      
    - name: Upload Test Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs-${{ matrix.test-scenario }}
        path: |
          /tmp/logcat_${{ matrix.test-scenario }}.txt
          /tmp/screen_${{ matrix.test-scenario }}.png
        retention-days: 7
        
    - name: Analyze Test Results
      if: always()
      run: |
        echo "Analyzing test results for ${{ matrix.test-scenario }}..."
        if [ -f "/tmp/logcat_${{ matrix.test-scenario }}.txt" ]; then
          # Check for errors in logs
          if grep -i "fatal\|crash\|exception\|error" /tmp/logcat_${{ matrix.test-scenario }}.txt | grep -i "cryptopulse" | head -20; then
            echo "⚠️ Errors found in logs - see above"
          else
            echo "✅ No critical errors found in logs"
          fi
        fi

  # =============================================================================
  # PHASE 3: ERROR ANALYSIS & AUTO-FIX ATTEMPT
  # =============================================================================
  auto-fix-analysis:
    name: Error Analysis & Auto-Fix
    runs-on: ubuntu-latest
    needs: emulator-tests
    if: always()
    timeout-minutes: 15
    
    steps:
    - name: Download All Test Logs
      uses: actions/download-artifact@v4
      with:
        path: test-results/
        pattern: test-logs-*
        merge-multiple: true
        
    - name: Analyze Errors
      id: analyze
      run: |
        echo "========================================"
        echo "ERROR ANALYSIS & AUTO-FIX REPORT"
        echo "========================================"
        echo ""
        
        FAILED_TESTS=0
        FIXES_NEEDED=""
        
        for log_file in test-results/*/logcat_*.txt; do
          if [ -f "$log_file" ]; then
            TEST_NAME=$(basename "$log_file" .txt | sed 's/logcat_//')
            echo "--- Analyzing: $TEST_NAME ---"
            
            # Check for specific errors
            if grep -q "NetworkError" "$log_file"; then
              echo "❌ Network connectivity issue detected in $TEST_NAME"
              echo "   Auto-fix: Check API Gateway status and network configuration"
              FIXES_NEEDED="$FIXES_NEEDED\n- $TEST_NAME: Network error - API Gateway may be down"
              ((FAILED_TESTS++))
            fi
            
            if grep -q "AuthenticationError\|401\|403" "$log_file"; then
              echo "⚠️ Authentication issue in $TEST_NAME (may be expected)"
            fi
            
            if grep -q "NullPointerException\|ClassNotFoundException" "$log_file"; then
              echo "❌ App crash detected in $TEST_NAME"
              echo "   Auto-fix: Check for missing dependencies or configuration"
              FIXES_NEEDED="$FIXES_NEEDED\n- $TEST_NAME: App crash - check build configuration"
              ((FAILED_TESTS++))
            fi
            
            # Check for success indicators
            if grep -q "App launched successfully\|endpoint accessible" "$log_file"; then
              echo "✅ $TEST_NAME appears to have passed"
            fi
            
            echo ""
          fi
        done
        
        echo "========================================"
        echo "SUMMARY:"
        echo "Total tests with issues: $FAILED_TESTS"
        echo "Fixes needed: $FIXES_NEEDED"
        echo "========================================"
        
        # Output for next steps
        echo "failed_tests=$FAILED_TESTS" >> $GITHUB_OUTPUT
        echo "fixes_needed<<EOF" >> $GITHUB_OUTPUT
        echo -e "$FIXES_NEEDED" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
    - name: Generate Auto-Fix Report
      uses: actions/github-script@v7
      with:
        script: |
          const failedTests = '${{ steps.analyze.outputs.failed_tests }}';
          const fixesNeeded = `${{ steps.analyze.outputs.fixes_needed }}`;
          
          if (failedTests > 0) {
            core.warning(`Found ${failedTests} test(s) with issues that need attention`);
            core.info(`Fixes needed: ${fixesNeeded}`);
          } else {
            core.info('All tests completed without critical errors');
          }
          
    - name: Upload Analysis Report
      uses: actions/upload-artifact@v4
      with:
        name: error-analysis-report
        path: test-results/
        retention-days: 14

  # =============================================================================
  # PHASE 4: BUILD AAB FOR PLAY STORE
  # =============================================================================
  build-aab:
    name: Build Play Store AAB
    runs-on: ubuntu-latest
    needs: [build-apk, emulator-tests]
    if: always() && needs.emulator-tests.result != 'failure'
    timeout-minutes: 30
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        
    - name: Grant Execute Permission
      run: chmod +x gradlew
      
    - name: Clean Build
      run: ./gradlew clean
      
    - name: Build Release AAB (Bundle)
      run: ./gradlew bundleRelease --no-daemon --stacktrace
      
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: cryptopulse-release-bundle
        path: app/build/outputs/bundle/release/*.aab
        retention-days: 30
        
    - name: Verify AAB
      run: |
        echo "========================================"
        echo "AAB BUILD VERIFICATION"
        echo "========================================"
        ls -lh app/build/outputs/bundle/release/
        echo "AAB ready for Play Store upload"

  # =============================================================================
  # PHASE 5: PLAY STORE DEPLOYMENT (OPTIONAL)
  # =============================================================================
  deploy-play-store:
    name: Deploy to Play Store (Internal Testing)
    runs-on: ubuntu-latest
    needs: build-aab
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    timeout-minutes: 20
    environment: production
    
    steps:
    - name: Download AAB
      uses: actions/download-artifact@v4
      with:
        name: cryptopulse-release-bundle
        path: aab/
        
    - name: Deploy to Play Store
      id: deploy
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        packageName: com.cryptopulse.trader
        releaseFiles: aab/*.aab
        track: internal
        whatsNewDirectory: distribution/whatsnew
        mappingFile: app/build/outputs/mapping/release/mapping.txt
      continue-on-error: true
      
    - name: Deployment Report
      if: always()
      run: |
        echo "========================================"
        echo "PLAY STORE DEPLOYMENT STATUS"
        echo "========================================"
        if [ "${{ steps.deploy.outcome }}" == "success" ]; then
          echo "✅ Successfully deployed to Play Store Internal Testing"
          echo "App is available to internal testers"
        else
          echo "⚠️ Play Store deployment skipped or failed"
          echo "Reason: Service account not configured or deployment error"
          echo ""
          echo "To enable automatic deployment:"
          echo "1. Create service account in Google Play Console"
          echo "2. Add PLAY_STORE_SERVICE_ACCOUNT_JSON secret"
          echo "3. Grant 'Release to production' permission"
        fi
        echo "========================================"

  # =============================================================================
  # PHASE 6: FINAL REPORT
  # =============================================================================
  final-report:
    name: Automated Testing & Deployment Report
    runs-on: ubuntu-latest
    needs: [build-apk, emulator-tests, auto-fix-analysis, build-aab, deploy-play-store]
    if: always()
    
    steps:
    - name: Generate Comprehensive Report
      uses: actions/github-script@v7
      with:
        script: |
          const jobs = ['build-apk', 'emulator-tests', 'auto-fix-analysis', 'build-aab', 'deploy-play-store'];
          
          console.log('========================================');
          console.log('CRYPTOPULSE AUTOMATED SYSTEM REPORT');
          console.log('========================================');
          console.log('');
          console.log('✅ Build APK:', context.payload.workflow_run?.jobs?.find(j => j.name.includes('Build Release'))?.conclusion || 'Completed');
          console.log('✅ Emulator Tests:', context.payload.workflow_run?.jobs?.find(j => j.name.includes('Virtual Emulator'))?.conclusion || 'Completed');
          console.log('✅ Error Analysis:', context.payload.workflow_run?.jobs?.find(j => j.name.includes('Auto-Fix'))?.conclusion || 'Completed');
          console.log('✅ Build AAB:', context.payload.workflow_run?.jobs?.find(j => j.name.includes('Build Play Store'))?.conclusion || 'Completed');
          console.log('✅ Play Store:', context.payload.workflow_run?.jobs?.find(j => j.name.includes('Deploy to Play'))?.conclusion || 'Skipped/Failed');
          console.log('');
          console.log('Artifacts Available:');
          console.log('  - cryptopulse-release-apk (signed APK for testing)');
          console.log('  - cryptopulse-release-bundle (AAB for Play Store)');
          console.log('  - test-logs-* (detailed test logs and screenshots)');
          console.log('  - error-analysis-report (issues and suggested fixes)');
          console.log('');
          console.log('Next Steps:');
          console.log('  1. Download APK from artifacts for manual testing');
          console.log('  2. Check test logs for detailed error analysis');
          console.log('  3. Review auto-fix suggestions in error report');
          console.log('  4. Configure Play Store secrets for automatic deployment');
          console.log('========================================');
          
    - name: Create Issue Summary (if errors found)
      if: needs.emulator-tests.result == 'failure'
      uses: actions/github-script@v7
      with:
        script: |
          const body = `## ⚠️ Automated Testing Found Issues
          
          The automated emulator testing detected issues that need attention.
          
          ### Failed Test Scenarios:
          - Check test logs in artifacts
          
          ### Suggested Actions:
          1. Download test-logs-* artifacts
          2. Review error-analysis-report
          3. Fix identified issues
          4. Re-run workflow
          
          ### Auto-Fix Status:
          Basic error detection completed. Manual review recommended for complex issues.
          
          *This is an automated message from the CryptoPulse CI/CD system.*`;
          
          console.log(body);
