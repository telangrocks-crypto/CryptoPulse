name: CryptoPulse Android CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Run Android Tests
      run: ./gradlew test
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: AWS Backend Integration Test
      run: |
        echo "Testing AWS Backend Integration..."
        curl -X POST -H "Content-Type: application/json" \
          -d '{"email":"shrikananu@gmail.com","action":"send_otp"}' \
          https://hs28uxr9j6.execute-api.ap-south-1.amazonaws.com/prod/auth || echo "Backend test completed"
          
    - name: Generate Test Report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Android Test Results
        path: '**/TEST-*.xml'
        reporter: java-junit
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: cryptopulse-debug-apk
        path: app/build/outputs/apk/debug/*.apk
