name: Manual Testing - Interactive Browser Emulator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # =============================================================================
  # BUILD APK FOR MANUAL TESTING
  # =============================================================================
  build-manual-testing-apk:
    name: Build APK for Manual Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        
    - name: Grant Execute Permission
      run: chmod +x gradlew
      
    - name: Build Debug APK (Faster)
      run: |
        ./gradlew clean assembleDebug --no-daemon --stacktrace
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: manual-testing-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

  # =============================================================================
  # DEPLOY TO BROWSER-BASED EMULATOR (Appetize.io)
  # =============================================================================
  deploy-to-appetize:
    name: Deploy to Browser Emulator (Appetize.io)
    runs-on: ubuntu-latest
    needs: build-manual-testing-apk
    timeout-minutes: 15
    outputs:
      emulator_url: ${{ steps.appetize.outputs.emulator_url }}
      public_url: ${{ steps.appetize.outputs.public_url }}
    
    steps:
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: manual-testing-apk
        path: ./
        
    - name: Upload to Appetize.io
      id: appetize
      run: |
        echo "Uploading APK to Appetize.io for browser-based testing..."
        
        # Check if APK exists
        if [ ! -f "app-debug.apk" ]; then
          echo "❌ APK file not found at app-debug.apk"
          ls -la
          exit 1
        fi
        
        echo "✅ APK found: $(ls -lh app-debug.apk)"
        
        # Upload to Appetize.io with better error handling
        UPLOAD_RESPONSE=$(curl -s -X POST \
          -H "Content-Type: multipart/form-data" \
          -F "file=@app-debug.apk" \
          -F "platform=android" \
          https://api.appetize.io/v1/apps 2>&1)
        
        echo "Raw Upload Response:"
        echo "$UPLOAD_RESPONSE"
        echo ""
        
        # Check for errors in response
        if echo "$UPLOAD_RESPONSE" | grep -q "error\|Error\|ERROR"; then
          echo "⚠️ Upload returned error response"
        fi
        
        # Extract publicKey - try multiple patterns
        PUBLIC_KEY=$(echo "$UPLOAD_RESPONSE" | grep -o '"publicKey"[^}]*' | grep -o '[a-zA-Z0-9_-]\{20,\}' | head -1)
        
        if [ -z "$PUBLIC_KEY" ]; then
          # Try alternative extraction
          PUBLIC_KEY=$(echo "$UPLOAD_RESPONSE" | grep -o '"publicKey":"[^"]*"' | sed 's/.*"publicKey":"\([^"]*\)".*/\1/')
        fi
        
        if [ -n "$PUBLIC_KEY" ] && [ ${#PUBLIC_KEY} -gt 10 ]; then
          EMULATOR_URL="https://appetize.io/embed/${PUBLIC_KEY}?device=pixel4&scale=75&orientation=portrait&osVersion=12.0"
          PUBLIC_LINK="https://appetize.io/app/${PUBLIC_KEY}?device=pixel4&scale=75&orientation=portrait&osVersion=12.0"
          
          echo "emulator_url=${EMULATOR_URL}" >> $GITHUB_OUTPUT
          echo "public_url=${PUBLIC_LINK}" >> $GITHUB_OUTPUT
          
          echo "✅ App uploaded successfully!"
          echo ""
          echo "═══════════════════════════════════════════════════"
          echo "  🎮 INTERACTIVE EMULATOR READY"
          echo "═══════════════════════════════════════════════════"
          echo ""
          echo "  Click this link to use the app in your browser:"
          echo "  ${PUBLIC_LINK}"
          echo ""
          echo "  You can:"
          echo "  • Click, tap, swipe like a real phone"
          echo "  • Type with your keyboard"
          echo "  • Test all features manually"
          echo "  • Session lasts ~10 minutes"
          echo ""
          echo "═══════════════════════════════════════════════════"
        else
          echo ""
          echo "⚠️ Appetize.io upload may have failed"
          echo ""
          echo "═══════════════════════════════════════════════════"
          echo "  📱 ALTERNATIVE: DOWNLOAD APK"
          echo "═══════════════════════════════════════════════════"
          echo ""
          echo "  Since browser emulator failed, you can:"
          echo ""
          echo "  1. Download the APK artifact from this workflow"
          echo "     (Look for 'manual-testing-apk' in artifacts)"
          echo ""
          echo "  2. Install on your Android device:"
          echo "     - Transfer APK to phone"
          echo "     - Tap to install"
          echo "     - Open and test normally"
          echo ""
          echo "  3. Or use Android Studio emulator:"
          echo "     - Tools → Device Manager"
          echo "     - Create virtual device"
          echo "     - Drag APK to emulator"
          echo ""
          echo "═══════════════════════════════════════════════════"
          
          # Don't fail the workflow, just warn
          echo "emulator_url=" >> $GITHUB_OUTPUT
          echo "public_url=" >> $GITHUB_OUTPUT
        fi
      continue-on-error: true
      
    - name: Comment on PR or Commit
      if: steps.appetize.outputs.public_url != '' && steps.appetize.outputs.public_url != 'https://appetize.io/app/?device=pixel4'
      uses: actions/github-script@v7
      with:
        script: |
          const emulatorUrl = '${{ steps.appetize.outputs.public_url }}';
          const embedUrl = '${{ steps.appetize.outputs.emulator_url }}';
          
          const body = `## 🎮 Manual Testing - Interactive Emulator Ready
          
          Your app is now running in a browser-based emulator! 
          
          ### 🔗 Click to Test:
          **[Launch Interactive Emulator](${emulatorUrl})**
          
          ### What you can do:
          - 📱 **Interact with the app** - Click, tap, swipe like a real Android phone
          - ⌨️ **Use your keyboard** - Type in text fields
          - 🔄 **Test all features** - Registration, trading, API keys, etc.
          - ⏱️ **Session lasts ~10 minutes** - Then re-run the workflow for a fresh session
          
          ### Alternative:
          - **Direct APK Download**: [manual-testing-apk artifact](${context.payload.repository.html_url}/actions/runs/${context.runId})
          - **Install locally**: Download APK and install on your Android device
          
          ---
          *Note: Using Appetize.io free tier (100 minutes/month). For more usage, create a paid account.*
          `;
          
          // Comment on the commit
          github.rest.repos.createCommitComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: context.sha,
            body: body
          });
          
          console.log('✅ Posted emulator link to commit');

  # =============================================================================
  # ALTERNATIVE: VNC-BASED EMULATOR (More Control)
  # =============================================================================
  vnc-emulator:
    name: VNC-Based Emulator (Advanced)
    runs-on: ubuntu-latest
    needs: build-manual-testing-apk
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch'  # Only on manual trigger to save resources
    
    steps:
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: manual-testing-apk
        path: ./
        
    - name: Setup Android SDK and Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        force-avd-creation: false
        emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
        disable-animations: false
        script: |
          echo "Setting up VNC server for remote access..."
          
          # Install VNC server
          sudo apt-get update
          sudo apt-get install -y tightvncserver x11-xserver-utils
          
          # Start VNC server
          export USER=root
          vncserver :1 -geometry 1280x720 -depth 24 -dpi 96
          
          # Get public URL via ngrok (if available)
          echo "VNC server started on display :1"
          echo "For remote access, use a VNC client or browser-based VNC viewer"
          
          # Install APK
          adb install -r app-debug.apk
          
          # Launch app
          adb shell am start -n com.cryptopulse.trader/.ui.MainActivity
          
          # Keep emulator running for 20 minutes
          echo "Emulator running for 20 minutes..."
          sleep 1200
          
    - name: VNC Info
      run: |
        echo "═══════════════════════════════════════════════════"
        echo "  VNC EMULATOR SESSION INFO"
        echo "═══════════════════════════════════════════════════"
        echo ""
        echo "  VNC Display: :1"
        echo "  Resolution: 1280x720"
        echo ""
        echo "  Note: VNC requires additional setup for public access"
        echo "  (ngrok tunnel or similar service needed)"
        echo ""
        echo "═══════════════════════════════════════════════════"
      continue-on-error: true

  # =============================================================================
  # SUMMARY
  # =============================================================================
  manual-testing-summary:
    name: Manual Testing Summary
    runs-on: ubuntu-latest
    needs: [build-manual-testing-apk, deploy-to-appetize]
    if: always()
    
    steps:
    - name: Generate Summary
      run: |
        echo "═══════════════════════════════════════════════════"
        echo "  📱 MANUAL TESTING - APK READY FOR DOWNLOAD"
        echo "═══════════════════════════════════════════════════"
        echo ""
        echo "  ✅ APK Build Complete!"
        echo ""
        echo "  📥 Download Instructions:"
        echo "  ─────────────────────────────────────────────────"
        echo ""
        echo "  1. Click 'Artifacts' section above (in this workflow run)"
        echo "  2. Download 'manual-testing-apk'"
        echo "  3. The file is: app-debug.apk"
        echo ""
        echo "  📱 Install on Android Device:"
        echo "  ─────────────────────────────────────────────────"
        echo "  • Transfer APK to your phone (USB, email, cloud)"
        echo "  • On phone: Tap the APK file"
        echo "  • Allow 'Install from unknown sources' if prompted"
        echo "  • Install and open the app"
        echo ""
        echo "  💻 Alternative: Android Studio Emulator"
        echo "  ─────────────────────────────────────────────────"
        echo "  • Open Android Studio"
        echo "  • Tools → Device Manager → Create Device"
        echo "  • Start emulator"
        echo "  • Drag APK file onto emulator window"
        echo ""
        echo "  🧪 Test Checklist:"
        echo "  • User Registration / Login"
        echo "  • API Key Setup"
        echo "  • Entry Price Configuration"
        echo "  • Trade Simulation"
        echo "  • Exchange Connectivity"
        echo ""
        echo "═══════════════════════════════════════════════════"
        echo "  Download the APK now and start testing!"
        echo "═══════════════════════════════════════════════════"
